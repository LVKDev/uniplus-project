<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniPlus - Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .login-container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        padding: 40px;
        width: 100%;
        max-width: 400px;
      }

      .login-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .login-header h1 {
        color: #333;
        font-size: 28px;
        margin-bottom: 5px;
      }

      .login-header p {
        color: #666;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        color: #333;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 14px;
      }

      .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .form-group input::placeholder {
        color: #999;
      }

      .login-button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        margin-bottom: 15px;
      }

      .login-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .login-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .alert {
        padding: 12px 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }

      .alert.error {
        background-color: #fee;
        color: #c33;
        border: 1px solid #fcc;
        display: block;
      }

      .alert.success {
        background-color: #efe;
        color: #3c3;
        border: 1px solid #cfc;
        display: block;
      }

      .loading {
        display: none;
        text-align: center;
        color: #666;
        font-size: 12px;
        margin-top: 10px;
      }

      .loading.active {
        display: block;
      }

      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        margin-right: 5px;
        border: 2px solid #667eea;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .demo-hint {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #e0e0e0;
        text-align: center;
        font-size: 12px;
        color: #999;
      }

      .demo-hint code {
        background: #f5f5f5;
        padding: 2px 6px;
        border-radius: 3px;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <h1>🚀 UniPlus</h1>
        <p>Sistema de Autenticação</p>
      </div>

      <div class="alert" id="alertBox"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="login-button" id="loginButton">
          Entrar
        </button>

        <div class="loading" id="loading">
          <span class="spinner"></span>Autenticando...
        </div>
      </form>

      <div class="demo-hint">
        <h4
          style="
            margin: 0 0 10px 0;
            font-size: 13px;
            color: #333;
            font-weight: 600;
          "
        >
          🔐 Credenciais SuperAdmin
        </h4>
        <p
          style="
            margin: 5px 0;
            font-family: &quot;Courier New&quot;, monospace;
            font-size: 12px;
          "
        >
          <code
            style="
              background: #f5f5f5;
              padding: 2px 6px;
              border-radius: 3px;
              color: #667eea;
            "
            >admin@cerionuniplus.com.br</code
          >
          /
          <code
            style="
              background: #f5f5f5;
              padding: 2px 6px;
              border-radius: 3px;
              color: #667eea;
            "
            >SuperAdmin@2026</code
          >
        </p>
      </div>
    </div>

    <script src="/js/login.js"></script>
  </body>
</html>
